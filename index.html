<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Drum Machine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almendra+SC&family=Bangers&family=Bruno+Ace+SC&family=Bungee&family=Creepster&family=Crimson+Text&family=Cutive+Mono&family=Geostar+Fill&family=IM+Fell+English&family=Inter&family=Metal+Mania&family=Metamorphous&family=Monoton&family=Orbitron:wght@700&family=Patrick+Hand&family=Press+Start+2P&family=Questrial&family=Roboto&family=Rye&family=Share+Tech+Mono&family=Special+Elite&family=Staatliches&family=UnifrakturMaguntia&family=VT323&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
    <style>
        /* --- General & Theming --- */
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2d2d2d;
            --border-color: #444;
            --accent-color: #d44400;
            --accent-hover: #ff6a00;
            --text-color: #e0e0e0;
            --font-family-header: 'Metal Mania', cursive;
            --font-family-body: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --led-off: #3a3a3a;
            --led-on: #ff4500;
            --led-playhead: #fffa00;
            --danger-color: #c00;
        }

        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-color);
            font-family: var(--font-family-body);
            margin: 0;
            padding: 15px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        /* --- Top Controls Section --- */
        #top-controls {
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px 25px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            justify-content: center;
        }

        #top-controls h1 {
            font-family: var(--font-family-header);
            color: var(--accent-color);
            font-size: 2.8em;
            margin: 0;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            flex-basis: 100%;
            text-align: center;
            margin-bottom: 10px;
        }
        
        /* --- Display Panel CSS --- */
        #playback-status-panel {
            flex-basis: 100%;
            background: #111;
            border: 2px solid var(--accent-color);
            border-radius: 6px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-family: 'Orbitron', monospace;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            color: var(--accent-hover);
        }
        
        .status-metric {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .status-metric label {
            font-size: 0.75em;
            text-transform: uppercase;
            color: var(--text-color);
            letter-spacing: 1px;
        }
        
        .status-metric span {
            font-size: 1.3em;
            font-weight: bold;
            text-shadow: 0 0 5px var(--accent-color);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
            background: #222;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
        }
        
        .control-group label {
            font-weight: bold;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        input[type="number"], input[type="text"], select {
            background: #111;
            border: 1px solid #555;
            color: var(--text-color);
            border-radius: 4px;
            padding: 8px;
            width: 80px;
            text-align: center;
            font-size: 1em;
            font-family: var(--font-family-body);
        }
        
        select {
             width: 150px;
             text-align: left;
             padding: 7px;
        }
        
        #song-structure-input {
            width: 200px;
            text-transform: uppercase;
        }
        
        #example-song-select, #skin-select {
            width: 170px;
        }

        /* --- Buttons --- */
        button {
            font-family: var(--font-family-body);
            font-weight: bold;
            background: linear-gradient(to bottom, #666, #444);
            color: var(--text-color);
            border: 2px outset #555;
            border-radius: 5px;
            padding: 8px 15px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 3px 0 #222;
        }
        
        button:hover {
            background: linear-gradient(to bottom, #777, #555);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #222;
            border-style: inset;
        }
        
        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        button.play-button.playing, button.toggled-on {
            background: linear-gradient(to bottom, #00b33c, #008a2e);
            color: white;
            border-color: #00d447;
            text-shadow: 0 0 5px white;
        }

        button.primary-action {
            background: linear-gradient(to bottom, var(--accent-color), #a03400);
            color: white;
            border-color: var(--accent-hover);
        }

        button.primary-action:hover {
             background: linear-gradient(to bottom, var(--accent-hover), #b1450f);
        }
        
        .remove-sequencer-btn {
            background: linear-gradient(to bottom, #900, var(--danger-color));
            color: white;
            border-color: #f33;
            width: 30px;
            height: 30px;
            padding: 0;
            font-size: 1.2em;
            line-height: 28px;
            text-align: center;
        }
        
        .remove-sequencer-btn:hover {
            background: linear-gradient(to bottom, #b00, #a00);
        }

        /* --- Panel Toggles --- */
        .panel-toggle-container {
            flex-basis: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .panel-toggle-container button {
            background: #333;
            border-color: #555;
        }

        /* --- Drum Kit Visualizer --- */
        #drum-kit-visualizer-container {
            flex-basis: 100%;
            max-width: 450px;
            margin: 0 auto 15px auto;
            background: #222;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
        }

        #drum-kit-visualizer {
            width: 100%;
            height: auto;
            aspect-ratio: 400 / 250;
            cursor: pointer;
        }
        
        #drum-kit-visualizer .kit-piece {
            transition: fill 0.1s ease;
        }
        #drum-kit-visualizer .kit-piece:hover {
            filter: brightness(1.2);
        }
        
        #drum-kit-visualizer .cymbal-base {
            fill: #a56a42;
        }
        
        .key-display {
            font-size: 20px;
            font-weight: bold;
            fill: var(--text-color);
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
            font-family: var(--font-family-body);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
        }

        .hit-indicator {
            opacity: 0;
            transition: opacity 0.05s ease-out;
            pointer-events: none;
        }

        .hit-indicator.hit {
            opacity: 1;
            filter: drop-shadow(0 0 8px var(--accent-hover));
        }

        /* --- Global Mix Panel --- */
        #global-mix-panel {
            flex-basis: 100%;
            background: #222;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin: 0 auto 15px auto;
        }
        
        .mix-panel-header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            padding: 10px 15px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }
        
        .mix-strip {
            display: grid;
            grid-template-areas: 
                "label label"
                "vol-label pan-label"
                "volume panning"
                "import-btn remove-btn";
            grid-template-columns: 1fr auto;
            gap: 5px;
            align-items: center;
            background: var(--panel-bg);
            padding: 8px;
            border-radius: 4px;
        }
        .mix-strip .instrument-name {
            grid-area: label;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 5px;
            text-transform: capitalize;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .mix-strip label {
            font-size: 0.8em;
            text-transform: uppercase;
            color: #aaa;
        }
        .mix-strip .vol-label { grid-area: vol-label; }
        .mix-strip .pan-label { grid-area: pan-label; }
        .mix-strip .global-volume-slider { grid-area: volume; width: 100%; margin: 0; }
        .mix-strip .global-panning-slider { grid-area: panning; width: 100%; margin: 0; }
        .mix-strip .sample-import-btn {
            grid-area: import-btn;
            font-size: 0.8em;
            padding: 4px;
            margin-top: 5px;
            width: 100%;
        }
        .mix-strip .instrument-remove-btn {
            grid-area: remove-btn;
            background: linear-gradient(to bottom, #900, var(--danger-color));
            border-color: #f33;
            font-size: 0.8em;
            padding: 4px 8px;
            margin-top: 5px;
            color: white;
        }

        /* --- Mastering Panel CSS --- */
        #mastering-panel {
            flex-basis: 100%;
            background: #222;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 15px;
            margin: 0 auto 15px auto;
        }
        
        .mastering-rack {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        
        .rack-unit {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
        }
        
        .unit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 8px;
        }
        
        .unit-header h3 {
            margin: 0;
            font-size: 1em;
            color: var(--accent-color);
            font-family: var(--font-family-body);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .unit-power {
            font-size: 0.75em;
            padding: 2px 6px;
        }
        
        .unit-power.active {
            background: linear-gradient(to bottom, #00b33c, #008a2e);
            color: white;
            text-shadow: 0 0 3px white;
        }
        
        .unit-knobs {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .knob-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8em;
        }
        
        .knob-group input[type="range"] {
            width: 90px;
            margin: 0;
        }

        /* --- Visual Sequence Block CSS --- */
        #song-structure-visual {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            background: #111;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            width: 100%;
            min-height: 44px;
            box-sizing: border-box;
            align-items: center;
            justify-content: center;
            margin-top: 5px;
        }
        
        .visual-block {
            background: #333;
            border: 1px solid #555;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85em;
            color: #ccc;
            transition: all 0.15s ease;
            font-family: 'Orbitron', monospace;
        }
        
        .visual-block.active {
            background: var(--led-playhead);
            color: #111;
            border-color: #fff;
            box-shadow: 0 0 10px var(--led-playhead);
            transform: scale(1.08);
        }

        /* --- Sequencer Container --- */
        .sequencer-container {
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .sequencer-header {
            display: flex;
            flex-wrap: wrap; 
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-color);
        }

        .sequencer-name {
            font-family: var(--font-family-header);
            font-size: 2.5em;
            background: #111;
            border: 1px solid #555;
            color: var(--accent-color);
            width: 100px;
            text-align: center;
        }

        .sequencer-grid {
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .instrument-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 10px;
        }

        /* --- Row Controls --- */
        .row-controls {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 150px;
            min-width: 150px;
            background-color: #222;
            padding: 5px;
            border-radius: 4px;
        }
        
        .row-controls-header {
            display: flex;
            gap: 5px;
        }

        .instrument-label {
            flex-grow: 1;
            background: #3a3a3a;
            text-align: center;
            font-weight: bold;
            border-radius: 4px;
            padding: 8px 0;
            cursor: pointer;
            transition: background-color 0.1s;
            border: none;
            box-shadow: none;
            font-size: 0.85em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            width: 100px;
        }
        
        .instrument-label:hover {
            background-color: #555;
        }

        .toggle-controls-btn {
            width: 40px;
            padding: 4px;
            font-size: 1.2em;
        }

        .extra-controls {
            display: grid;
            grid-template-areas:
                "vel-btn vel-btn"
                "rnd-btn clear-btn";
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            padding-top: 5px;
            border-top: 1px solid var(--border-color);
            margin-top: 5px;
        }
        
        .extra-controls .toggle-velocity-btn { grid-area: vel-btn; font-size: 0.8em; padding: 4px; }
        .extra-controls .rnd-row-btn { grid-area: rnd-btn; font-size: 0.8em; padding: 4px;}
        .extra-controls .clear-row-btn { grid-area: clear-btn; font-size: 0.8em; padding: 4px;}


        .steps-container {
            display: flex;
            gap: 5px;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .step-checkbox {
            -webkit-appearance: none;
            appearance: none;
            width: 35px;
            height: 35px;
            background-color: var(--led-off);
            border: 2px solid #222;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .step-checkbox:checked {
            background-color: var(--led-on);
            box-shadow: 0 0 10px var(--led-on);
        }
        
        .step-checkbox.playing {
            outline: 2px solid var(--led-playhead);
            box-shadow: 0 0 10px var(--led-playhead);
        }
        
        .beat-marker:not(:checked) {
            background-color: #282828;
        }

        .bar-start:not(:checked) {
            background-color: #404040; 
            border-color: #555;
        }

        .velocity-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 35px;
            height: 8px;
            background: #444;
            outline: none;
            border-radius: 4px;
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            transform: rotate(180deg);
            height: 50px;
            width: 10px;
            cursor: pointer;
        }

        /* --- Sliders --- */
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 15px;
            background: #333;
            outline: none;
            border: 1px solid #555;
            border-radius: 5px;
            margin: 5px 0;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent-color);
            border: 2px solid var(--text-color);
            cursor: pointer;
            border-radius: 50%;
            margin-top: -3px;
        }

        input[type=range]:hover::-webkit-slider-thumb {
            background: var(--accent-hover);
        }
        
        .control-group output {
            font-weight: bold;
            color: var(--accent-color);
        }

        .sub-control-group {
            display: flex;
            flex-direction: column;
            width: 100%;
            align-items: center;
            gap: 2px;
            margin-top: 8px;
        }

        .sub-control-group label {
            font-size: 0.8em;
            color: #ccc;
            font-weight: normal;
            text-transform: none;
        }

    </style>
</head>
<body>

    <div id="top-controls">
        <h1>SongDrumMachine Drum Sequencer</h1>

        <!-- High-contrast display panel of the sequencer / song status -->
        <div id="playback-status-panel">
            <div class="status-metric">
                <label>Active Sequencer</label>
                <span id="display-active-seq">-</span>
            </div>
            <div class="status-metric">
                <label>Seq Time</label>
                <span id="display-seq-time">0:00.0 / 0:00.0</span>
            </div>
            <div class="status-metric">
                <label>Song Time</label>
                <span id="display-song-time">0:00.0 / 0:00.0</span>
            </div>
        </div>

        <div class="panel-toggle-container">
            <button id="toggle-mixer-btn">Show Volume, Pan & Sample</button>
            <button id="toggle-visualizer-btn">Show Live Monitor</button>
            <button id="toggle-mastering-btn">Show Mastering Processor</button>
            <button id="info-btn" class="primary-action">Arrangement Info</button>
        </div>

        <!-- Master FX Rack -->
        <div id="mastering-panel" class="hidden">
            <div class="mastering-rack">
                <!-- Saturation -->
                <div class="rack-unit">
                    <div class="unit-header">
                        <h3>Saturation</h3>
                        <button id="sat-toggle-btn" class="unit-power">OFF</button>
                    </div>
                    <div class="unit-knobs">
                        <div class="knob-group">
                            <label>Drive</label>
                            <input type="range" id="sat-drive" min="0" max="100" value="20">
                        </div>
                        <div class="knob-group">
                            <label>Mix</label>
                            <input type="range" id="sat-mix" min="0" max="100" value="40">
                        </div>
                    </div>
                </div>
                <!-- Compressor -->
                <div class="rack-unit">
                    <div class="unit-header">
                        <h3>Compressor</h3>
                        <button id="comp-toggle-btn" class="unit-power">OFF</button>
                    </div>
                    <div class="unit-knobs">
                        <div class="knob-group">
                            <label>Thresh</label>
                            <input type="range" id="comp-thresh" min="-60" max="0" value="-24">
                        </div>
                        <div class="knob-group">
                            <label>Ratio</label>
                            <input type="range" id="comp-ratio" min="1" max="20" value="4">
                        </div>
                    </div>
                </div>
                <!-- Master Lowpass / Highpass Filters -->
                <div class="rack-unit">
                    <div class="unit-header">
                        <h3>Master Filters</h3>
                        <button id="filter-toggle-btn" class="unit-power">OFF</button>
                    </div>
                    <div class="unit-knobs">
                        <div class="knob-group">
                            <label>HPF Freq</label>
                            <input type="range" id="filter-hpf" min="10" max="1000" value="10">
                        </div>
                        <div class="knob-group">
                            <label>LPF Freq</label>
                            <input type="range" id="filter-lpf" min="100" max="22000" value="22000">
                        </div>
                    </div>
                </div>
                <!-- Delay -->
                <div class="rack-unit">
                    <div class="unit-header">
                        <h3>Room Delay</h3>
                        <button id="delay-toggle-btn" class="unit-power">OFF</button>
                    </div>
                    <div class="unit-knobs">
                        <div class="knob-group">
                            <label>Time</label>
                            <input type="range" id="delay-time" min="20" max="1000" value="150">
                        </div>
                        <div class="knob-group">
                            <label>Feedback</label>
                            <input type="range" id="delay-feedback" min="0" max="95" value="30">
                        </div>
                    </div>
                </div>
                <!-- Reverb -->
                <div class="rack-unit">
                    <div class="unit-header">
                        <h3>Reverb</h3>
                        <button id="reverb-toggle-btn" class="unit-power">OFF</button>
                    </div>
                    <div class="unit-knobs">
                        <div class="knob-group">
                            <label>Decay</label>
                            <input type="range" id="reverb-decay" min="5" max="50" value="15">
                        </div>
                        <div class="knob-group">
                            <label>Mix</label>
                            <input type="range" id="reverb-mix" min="0" max="100" value="15">
                        </div>
                    </div>
                </div>
                <!-- Limiter -->
                <div class="rack-unit">
                    <div class="unit-header">
                        <h3>Limiter</h3>
                        <button id="limiter-toggle-btn" class="unit-power">OFF</button>
                    </div>
                    <div class="unit-knobs">
                        <div class="knob-group">
                            <label>Ceiling</label>
                            <input type="range" id="limiter-ceil" min="-10" max="0" step="0.1" value="-1">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Global Volume, Pan & Sample Import/Management Panel -->
        <div id="global-mix-panel" class="hidden">
            <!-- Dynamic strips and instrument management buttons will be injected here by JS -->
        </div>
        
        <!-- Live SVG Drum Kit Visual Monitor -->
        <div id="drum-kit-visualizer-container" class="hidden">
            <svg id="drum-kit-visualizer" viewBox="0 0 400 250">
                <g id="kit-base" stroke="#333" stroke-width="2">
                    <ellipse class="kit-piece" data-visual-id="kick" fill="#555" cx="225" cy="170" rx="45" ry="40" />
                    <circle class="kit-piece cymbal-base" data-visual-id="crash1" cx="60" cy="60" r="45" />
                    <circle class="kit-piece cymbal-base" data-visual-id="ride" cx="340" cy="70" r="55" />
                    <circle class="kit-piece cymbal-base" data-visual-id="china" cx="150" cy="40" r="30" />
                    <circle class="kit-piece" data-visual-id="hi-hat" fill="#8b5a36" cx="100" cy="160" r="40" />
                    <circle class="kit-piece" data-visual-id="snare" fill="#e0e0e0" cx="175" cy="150" r="35" />
                    <circle class="kit-piece" data-visual-id="tom1" fill="#777" cx="200" cy="85" r="25" />
                    <circle class="kit-piece" data-visual-id="tom2" fill="#777" cx="265" cy="95" r="30" />
                    <ellipse class="kit-piece" data-visual-id="floor-tom" fill="#777" cx="300" cy="165" rx="35" ry="38" />
                    <circle class="kit-piece" data-visual-id="tom3" fill="#777" cx="345" cy="120" r="28" />
                    <circle class="kit-piece cymbal-base" data-visual-id="crash2" cx="250" cy="40" r="40" />
                </g>
                <g class="key-display">
                    <text x="225" y="170">A</text>
                    <text x="60" y="60">E</text>
                    <text x="340" y="70">R</text>
                    <text x="150" y="40">Y</text>
                    <text x="100" y="160" font-size="16px">D / W</text>
                    <text x="175" y="150" fill="#111">S</text>
                    <text x="200" y="85">G</text>
                    <text x="265" y="95">F</text>
                    <text x="300" y="165">H</text>
                    <text x="345" y="120">J</text>
                    <text x="250" y="40">T</text>
                </g>
                <g id="kit-hits" fill="var(--led-playhead)" stroke="var(--accent-hover)" stroke-width="3">
                     <ellipse class="hit-indicator" id="vis-kick" cx="225" cy="170" rx="45" ry="40" />
                     <circle class="hit-indicator" id="vis-crash1" cx="60" cy="60" r="45" />
                     <circle class="hit-indicator" id="vis-ride" cx="340" cy="70" r="55" />
                     <circle class="hit-indicator" id="vis-china" cx="150" cy="40" r="30" />
                     <circle class="hit-indicator" id="vis-hi-hat" cx="100" cy="160" r="40" />
                     <circle class="hit-indicator" id="vis-snare" cx="175" cy="150" r="35" />
                     <circle class="hit-indicator" id="vis-tom1" cx="200" cy="85" r="25" />
                     <circle class="hit-indicator" id="vis-tom2" cx="265" cy="95" r="30" />
                     <ellipse class="hit-indicator" id="vis-floor-tom" cx="300" cy="165" rx="35" ry="38" />
                     <circle class="hit-indicator" id="vis-tom3" cx="345" cy="120" r="28" />
                     <circle class="hit-indicator" id="vis-crash2" cx="250" cy="40" r="40" />
                </g>
            </svg>
        </div>

        <div class="control-group">
            <label>Master Volume</label>
            <input type="range" id="master-volume" min="0" max="1" step="0.01" value="0.8">
        </div>

        <div class="control-group">
            <label for="skin-select">Skin</label>
            <select id="skin-select">
                <!-- Options will be added by JS -->
            </select>
        </div>
        
        <div class="control-group">
            <label for="tempo-input">Tempo (BPM)</label>
            <input type="number" id="tempo-input" value="120" min="20" max="300">
            <button id="tap-tempo-btn">TAP</button>
        </div>

        <div class="control-group">
            <label>Humanizer</label>
            <button id="humanize-btn">Humanize OFF</button>
            <div class="sub-control-group">
                <label for="timing-humanize-slider">Timing Rand: <output for="timing-humanize-slider">0</output>%</label>
                <input type="range" id="timing-humanize-slider" min="0" max="1" step="0.01" value="0">
            </div>
            <div class="sub-control-group">
                <label for="velocity-humanize-slider">Velocity Rand: <output for="velocity-humanize-slider">0</output>%</label>
                <input type="range" id="velocity-humanize-slider" min="0" max="1" step="0.01" value="0">
            </div>
             <div class="sub-control-group">
                <label for="swing-slider">Swing: <output for="swing-slider">50</output>%</label>
                <input type="range" id="swing-slider" min="0" max="0.25" step="0.005" value="0">
            </div>
        </div>
        
        <div class="control-group">
            <label>MIDI</label>
            <div style="display: flex; flex-direction: column; gap: 5px;">
                 <select id="midi-in-select"><option>No MIDI Input</option></select>
                 <select id="midi-out-select"><option>No MIDI Output</option></select>
                 <button id="scan-midi-btn">Scan for MIDI</button>
            </div>
        </div>

        <div class="control-group">
             <label for="sequencer-amount-input">Add Sequencers</label>
             <div style="display:flex; gap: 5px;">
                <input type="number" id="sequencer-amount-input" value="1" min="1" max="10">
                <button id="insert-sequencers-btn" class="primary-action">Insert</button>
             </div>
        </div>

        <!-- Arrangement Section containing dynamic progress indicators -->
        <div class="control-group" style="flex-basis: 100%;">
            <label for="song-structure-input">Song Structure & Highlighted Progress</label>
            <input type="text" id="song-structure-input" placeholder="e.g. <+A+A4B>">
            <div id="song-structure-visual">
                <!-- Rendered sequence blocks go here -->
            </div>
            <div style="display:flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-top: 5px;">
                <button id="song-play-btn" class="play-button">Song Play</button>
                <button id="export-song-midi-btn" class="primary-action">Export MIDI</button>
                <button id="export-song-wav-btn" class="primary-action">Export WAV</button>
            </div>
        </div>
        
        <div class="control-group">
            <label>Song File</label>
            <div style="display:flex; gap: 5px;">
                <button id="import-song-btn">Import Song</button>
                <button id="export-song-btn">Export Song</button>
            </div>
        </div>
        
        <div class="control-group">
            <label>Session File</label>
            <div style="display:flex; gap: 5px;">
                <button id="load-session-btn">Load Session</button>
                <button id="save-session-btn">Save Session</button>
            </div>
        </div>

        <div class="control-group">
            <label>Generate Random Song</label>
            <button id="random-song-btn" class="primary-action">Generate</button>
        </div>
        
        <div class="control-group">
            <label>Random Fills</label>
            <button id="random-fills-btn" class="toggled-on">Fills ON</button>
        </div>

        <div class="control-group">
            <label>Count In</label>
            <button id="count-in-btn">Count In OFF</button>
        </div>

        <div class="control-group">
            <label for="example-song-select">Load Example Song</label>
            <select id="example-song-select">
                <option value="">-- Select Song --</option>
            </select>
        </div>
    </div>

    <div id="sequencers-container">
        <!-- Sequencers will be dynamically inserted here by JavaScript -->
    </div>
    
    <!-- Converted Data Modules -->
    <script src="rhythms.js"></script>
    <script src="skins.js"></script>
    <script src="songs.js"></script>

    <!-- Core Modular Scripts -->
    <script src="info-panel.js"></script>
    <script src="mastering-effects.js"></script>
    <script src="midi-wav-exporter.js"></script>
    <script src="main.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Drum Machine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almendra+SC&family=Bangers&family=Bruno+Ace+SC&family=Bungee&family=Creepster&family=Crimson+Text&family=Cutive+Mono&family=Geostar+Fill&family=IM+Fell+English&family=Inter&family=Metal+Mania&family=Metamorphous&family=Monoton&family=Orbitron:wght@700&family=Patrick+Hand&family=Press+Start+2P&family=Questrial&family=Roboto&family=Rye&family=Share+Tech+Mono&family=Special+Elite&family=Staatliches&family=UnifrakturMaguntia&family=VT323&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
    <style>
        /* --- General & Theming --- */
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2d2d2d;
            --border-color: #444;
            --accent-color: #d44400;
            --accent-hover: #ff6a00;
            --text-color: #e0e0e0;
            --font-family-header: 'Metal Mania', cursive;
            --font-family-body: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --led-off: #3a3a3a;
            --led-on: #ff4500;
            --led-playhead: #fffa00;
            --danger-color: #c00;
        }

        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-color);
            font-family: var(--font-family-body);
            margin: 0;
            padding: 15px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        /* --- Top Controls Section --- */
        #top-controls {
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px 25px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            justify-content: center;
        }

        #top-controls h1 {
            font-family: var(--font-family-header);
            color: var(--accent-color);
            font-size: 2.8em;
            margin: 0;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            flex-basis: 100%;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
            background: #222;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
        }
        
        .control-group label {
            font-weight: bold;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        input[type="number"], input[type="text"], select {
            background: #111;
            border: 1px solid #555;
            color: var(--text-color);
            border-radius: 4px;
            padding: 8px;
            width: 80px;
            text-align: center;
            font-size: 1em;
            font-family: var(--font-family-body);
        }
        
        select {
             width: 150px;
             text-align: left;
             padding: 7px;
        }
        
        #song-structure-input {
            width: 200px;
            text-transform: uppercase;
        }
        
        #example-song-select, #skin-select {
            width: 170px;
        }

        /* --- Buttons --- */
        button {
            font-family: var(--font-family-body);
            font-weight: bold;
            background: linear-gradient(to bottom, #666, #444);
            color: var(--text-color);
            border: 2px outset #555;
            border-radius: 5px;
            padding: 8px 15px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 3px 0 #222;
        }
        
        button:hover {
            background: linear-gradient(to bottom, #777, #555);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #222;
            border-style: inset;
        }
        
        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        button.play-button.playing, button.toggled-on {
            background: linear-gradient(to bottom, #00b33c, #008a2e);
            color: white;
            border-color: #00d447;
            text-shadow: 0 0 5px white;
        }

        button.primary-action {
            background: linear-gradient(to bottom, var(--accent-color), #a03400);
            color: white;
            border-color: var(--accent-hover);
        }

        button.primary-action:hover {
             background: linear-gradient(to bottom, var(--accent-hover), #b1450f);
        }
        
        .remove-sequencer-btn {
            background: linear-gradient(to bottom, #900, var(--danger-color));
            color: white;
            border-color: #f33;
            width: 30px;
            height: 30px;
            padding: 0;
            font-size: 1.2em;
            line-height: 28px;
            text-align: center;
        }
        
        .remove-sequencer-btn:hover {
            background: linear-gradient(to bottom, #b00, #a00);
        }

        /* --- Panel Toggles --- */
        .panel-toggle-container {
            flex-basis: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        .panel-toggle-container button {
             background: #333;
            border-color: #555;
        }

        /* --- Drum Kit Visualizer --- */
        #drum-kit-visualizer-container {
            flex-basis: 100%;
            max-width: 450px;
            margin: 0 auto 15px auto;
            background: #222;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
        }

        #drum-kit-visualizer {
            width: 100%;
            height: auto;
            aspect-ratio: 400 / 250; /* Maintain aspect ratio */
            cursor: pointer;
        }
        
        #drum-kit-visualizer .kit-piece {
            transition: fill 0.1s ease;
        }
        #drum-kit-visualizer .kit-piece:hover {
            filter: brightness(1.2);
        }
        
        #drum-kit-visualizer .cymbal-base {
            fill: #a56a42; /* Light brown/bronze for cymbals */
        }
        
        .key-display {
            font-size: 20px;
            font-weight: bold;
            fill: var(--text-color);
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none; /* CRITICAL: Allows clicks to pass through to the shape below */
            font-family: var(--font-family-body);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
        }

        .hit-indicator {
            opacity: 0;
            transition: opacity 0.05s ease-out;
            pointer-events: none;
        }

        .hit-indicator.hit {
            opacity: 1;
            filter: drop-shadow(0 0 8px var(--accent-hover));
        }

        /* --- Global Mix Panel --- */
        #global-mix-panel {
            flex-basis: 100%;
            background: #222;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin: 0 auto 15px auto;
        }
        .mix-strip {
            display: grid;
            grid-template-areas: 
                "label label"
                "vol-label pan-label"
                "volume panning"
                "import-btn import-btn";
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            align-items: center;
            background: var(--panel-bg);
            padding: 8px;
            border-radius: 4px;
        }
        .mix-strip .instrument-name {
            grid-area: label;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 5px;
            text-transform: capitalize;
        }
        .mix-strip label {
            font-size: 0.8em;
            text-transform: uppercase;
            color: #aaa;
        }
        .mix-strip .vol-label { grid-area: vol-label; }
        .mix-strip .pan-label { grid-area: pan-label; }
        .mix-strip .global-volume-slider { grid-area: volume; width: 100%; margin: 0; }
        .mix-strip .global-panning-slider { grid-area: panning; width: 100%; margin: 0; }
        .mix-strip .sample-import-btn {
            grid-area: import-btn;
            font-size: 0.8em;
            padding: 4px;
            margin-top: 5px;
            width: 100%;
        }

        /* --- Sequencer Container --- */
        .sequencer-container {
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .sequencer-header {
            display: flex;
            flex-wrap: wrap; 
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-color);
        }

        .sequencer-name {
            font-family: var(--font-family-header);
            font-size: 2.5em;
            background: #111;
            border: 1px solid #555;
            color: var(--accent-color);
            width: 100px;
            text-align: center;
        }

        .sequencer-grid {
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .instrument-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 10px;
        }

        /* --- Row Controls --- */
        .row-controls {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 150px;
            min-width: 150px;
            background-color: #222;
            padding: 5px;
            border-radius: 4px;
        }
        
        .row-controls-header {
            display: flex;
            gap: 5px;
        }

        .instrument-label {
            flex-grow: 1;
            background: #3a3a3a;
            text-align: center;
            font-weight: bold;
            border-radius: 4px;
            padding: 8px 0;
            cursor: pointer;
            transition: background-color 0.1s;
            border: none;
            box-shadow: none;
        }
        
        .instrument-label:hover {
            background-color: #555;
        }

        .toggle-controls-btn {
            width: 40px;
            padding: 4px;
            font-size: 1.2em;
        }

        .extra-controls {
            display: grid;
            grid-template-areas:
                "vel-btn vel-btn"
                "rnd-btn clear-btn";
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            padding-top: 5px;
            border-top: 1px solid var(--border-color);
            margin-top: 5px;
        }
        
        .extra-controls .toggle-velocity-btn { grid-area: vel-btn; font-size: 0.8em; padding: 4px; }
        .extra-controls .rnd-row-btn { grid-area: rnd-btn; font-size: 0.8em; padding: 4px;}
        .extra-controls .clear-row-btn { grid-area: clear-btn; font-size: 0.8em; padding: 4px;}


        .steps-container {
            display: flex;
            gap: 5px;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .step-checkbox {
            -webkit-appearance: none;
            appearance: none;
            width: 35px;
            height: 35px;
            background-color: var(--led-off);
            border: 2px solid #222;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .step-checkbox:checked {
            background-color: var(--led-on);
            box-shadow: 0 0 10px var(--led-on);
        }
        
        .step-checkbox.playing {
            outline: 2px solid var(--led-playhead);
            box-shadow: 0 0 10px var(--led-playhead);
        }
        
        /* For regular beats (2, 3, 4, etc.) - a subtle dark gray */
        .beat-marker:not(:checked) {
            background-color: #282828;
        }

        /* For the first beat of the bar (the "1") - a brighter, more prominent gray */
        .bar-start:not(:checked) {
            background-color: #404040; 
            border-color: #555;
        }

        .velocity-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 35px;
            height: 8px;
            background: #444;
            outline: none;
            border-radius: 4px;
            writing-mode: bt-lr; /* IE */
            -webkit-appearance: slider-vertical; /* WebKit */
            transform: rotate(180deg);
            height: 50px;
            width: 10px;
            cursor: pointer;
        }

        /* --- Sliders --- */
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 15px;
            background: #333;
            outline: none;
            border: 1px solid #555;
            border-radius: 5px;
            margin: 5px 0;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent-color);
            border: 2px solid var(--text-color);
            cursor: pointer;
            border-radius: 50%;
            margin-top: -3px;
        }

        input[type=range]:hover::-webkit-slider-thumb {
            background: var(--accent-hover);
        }
        
        .control-group output {
            font-weight: bold;
            color: var(--accent-color);
        }

        .sub-control-group {
            display: flex;
            flex-direction: column;
            width: 100%;
            align-items: center;
            gap: 2px;
            margin-top: 8px;
        }

        .sub-control-group label {
            font-size: 0.8em;
            color: #ccc;
            font-weight: normal;
            text-transform: none;
        }

    </style>
</head>
<body>

    <div id="top-controls">
        <h1>SongDrumMachine Drum Sequencer</h1>

        <div class="panel-toggle-container">
            <button id="toggle-mixer-btn">Show Volume, Pan & Sample</button>
            <button id="toggle-visualizer-btn">Show Live Monitor</button>
        </div>

        <div id="global-mix-panel" class="hidden">
            <!-- Sliders will be injected here by JS -->
        </div>
        
        <div id="drum-kit-visualizer-container" class="hidden">
            <svg id="drum-kit-visualizer" viewBox="0 0 400 250">
                <!-- Base Kit Shapes (with specific fills and classes) -->
                <g id="kit-base" stroke="#333" stroke-width="2">
                    <!-- Kick drum first to be at the bottom -->
                    <ellipse class="kit-piece" data-visual-id="kick" fill="#555" cx="225" cy="170" rx="45" ry="40" />

                    <!-- Cymbals with a class for styling -->
                    <circle class="kit-piece cymbal-base" data-visual-id="crash1" cx="60" cy="60" r="45" />
                    <circle class="kit-piece cymbal-base" data-visual-id="ride" cx="340" cy="70" r="55" />
                    <circle class="kit-piece cymbal-base" data-visual-id="china" cx="150" cy="40" r="30" />

                    <!-- Drums -->
                    <circle class="kit-piece" data-visual-id="hi-hat" fill="#8b5a36" cx="100" cy="160" r="40" />
                    <circle class="kit-piece" data-visual-id="snare" fill="#e0e0e0" cx="175" cy="150" r="35" />
                    <circle class="kit-piece" data-visual-id="tom1" fill="#777" cx="200" cy="85" r="25" />
                    <circle class="kit-piece" data-visual-id="tom2" fill="#777" cx="265" cy="95" r="30" />
                    <ellipse class="kit-piece" data-visual-id="floor-tom" fill="#777" cx="300" cy="165" rx="35" ry="38" />
                    <circle class="kit-piece" data-visual-id="tom3" fill="#777" cx="345" cy="120" r="28" />

                    <!-- Crash 2 last to be on top of other cymbals -->
                    <circle class="kit-piece cymbal-base" data-visual-id="crash2" cx="250" cy="40" r="40" />
                </g>
                <!-- KEY LABELS -->
                <g class="key-display">
                    <text x="225" y="170">A</text>
                    <text x="60" y="60">E</text>
                    <text x="340" y="70">R</text>
                    <text x="150" y="40">Y</text>
                    <text x="100" y="160" font-size="16px">D / W</text>
                    <text x="175" y="150" fill="#111">S</text>
                    <text x="200" y="85">G</text>
                    <text x="265" y="95">F</text>
                    <text x="300" y="165">H</text>
                    <text x="345" y="120">J</text>
                    <text x="250" y="40">T</text>
                </g>
                <!-- Hit Highlights (initially hidden, mirrored structure) -->
                <g id="kit-hits" fill="var(--led-playhead)" stroke="var(--accent-hover)" stroke-width="3">
                     <ellipse class="hit-indicator" id="vis-kick" cx="225" cy="170" rx="45" ry="40" />
                     <circle class="hit-indicator" id="vis-crash1" cx="60" cy="60" r="45" />
                     <circle class="hit-indicator" id="vis-ride" cx="340" cy="70" r="55" />
                     <circle class="hit-indicator" id="vis-china" cx="150" cy="40" r="30" />
                     <circle class="hit-indicator" id="vis-hi-hat" cx="100" cy="160" r="40" />
                     <circle class="hit-indicator" id="vis-snare" cx="175" cy="150" r="35" />
                     <circle class="hit-indicator" id="vis-tom1" cx="200" cy="85" r="25" />
                     <circle class="hit-indicator" id="vis-tom2" cx="265" cy="95" r="30" />
                     <ellipse class="hit-indicator" id="vis-floor-tom" cx="300" cy="165" rx="35" ry="38" />
                     <circle class="hit-indicator" id="vis-tom3" cx="345" cy="120" r="28" />
                     <circle class="hit-indicator" id="vis-crash2" cx="250" cy="40" r="40" />
                </g>
            </svg>
        </div>

        <div class="control-group">
            <label>Master Volume</label>
            <input type="range" id="master-volume" min="0" max="1" step="0.01" value="0.8">
        </div>

        <div class="control-group">
            <label for="skin-select">Skin</label>
            <select id="skin-select">
                <!-- Options will be added by JS -->
            </select>
        </div>
        
        <div class="control-group">
            <label for="tempo-input">Tempo (BPM)</label>
            <input type="number" id="tempo-input" value="120" min="20" max="300">
            <button id="tap-tempo-btn">TAP</button>
        </div>

        <div class="control-group">
            <label>Humanizer</label>
            <button id="humanize-btn">Humanize OFF</button>
            <div class="sub-control-group">
                <label for="timing-humanize-slider">Timing Rand: <output for="timing-humanize-slider">0</output>%</label>
                <input type="range" id="timing-humanize-slider" min="0" max="1" step="0.01" value="0">
            </div>
            <div class="sub-control-group">
                <label for="velocity-humanize-slider">Velocity Rand: <output for="velocity-humanize-slider">0</output>%</label>
                <input type="range" id="velocity-humanize-slider" min="0" max="1" step="0.01" value="0">
            </div>
             <div class="sub-control-group">
                <label for="swing-slider">Swing: <output for="swing-slider">50</output>%</label>
                <input type="range" id="swing-slider" min="0" max="0.25" step="0.005" value="0">
            </div>
        </div>
        
        <div class="control-group">
            <label>MIDI</label>
            <div style="display: flex; flex-direction: column; gap: 5px;">
                 <select id="midi-in-select"><option>No MIDI Input</option></select>
                 <select id="midi-out-select"><option>No MIDI Output</option></select>
                 <button id="scan-midi-btn">Scan for MIDI</button>
            </div>
        </div>

        <div class="control-group">
             <label for="sequencer-amount-input">Add Sequencers</label>
             <div style="display:flex; gap: 5px;">
                <input type="number" id="sequencer-amount-input" value="1" min="1" max="10">
                <button id="insert-sequencers-btn" class="primary-action">Insert</button>
             </div>
        </div>

        <div class="control-group">
            <label for="song-structure-input">Song Structure</label>
            <input type="text" id="song-structure-input" placeholder="e.g. AB1AB2C">
            <div style="display:flex; flex-wrap: wrap; gap: 5px; justify-content: center;">
                <button id="song-play-btn" class="play-button">Song Play</button>
                <button id="export-song-midi-btn" class="primary-action">Export MIDI</button>
                <button id="export-song-wav-btn" class="primary-action">Export WAV</button>
            </div>
        </div>
        
        <div class="control-group">
            <label>Song File</label>
            <div style="display:flex; gap: 5px;">
                <button id="import-song-btn">Import Song</button>
                <button id="export-song-btn">Export Song</button>
            </div>
        </div>
        
        <div class="control-group">
            <label>Session File</label>
            <div style="display:flex; gap: 5px;">
                <button id="load-session-btn">Load Session</button>
                <button id="save-session-btn">Save Session</button>
            </div>
        </div>

        <div class="control-group">
            <label>Generate Random Song</label>
            <button id="random-song-btn" class="primary-action">Generate</button>
        </div>
        
        <div class="control-group">
            <label>Random Fills</label>
            <button id="random-fills-btn" class="toggled-on">Fills ON</button>
        </div>

        <div class="control-group">
            <label>Count In</label>
            <button id="count-in-btn">Count In OFF</button>
        </div>

        <div class="control-group">
            <label for="example-song-select">Load Example Song</label>
            <select id="example-song-select">
                <option value="">-- Select Song --</option>
            </select>
        </div>
    </div>

    <div id="sequencers-container">
        <!-- Sequencers will be inserted here by JavaScript -->
    </div>
    
    <script src="midi-wav-exporter.js"></script>

    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        // --- GLOBAL STATE & CORE VARIABLES ---
        let audioContext;
        const audioBuffers = {};
        let isPlaying = false;
        let isSongPlaying = false;
        let currentStep = 0;
        let bpm = 120;
        let timingHumanizeAmount = 0;
        let velocityHumanizeAmount = 0;
        let swingAmount = 0;
        let isHumanizeOn = false;
        let sequencersData = {};
        let skinsData = {};

        // --- PLAYBACK SCHEDULING VARIABLES ---
        let schedulerTimerID;
        let nextNoteTime = 0.0;
        const scheduleAheadTime = 0.1;
        let playbackPhase = 'stopped'; // Can be 'stopped', 'countingIn', or 'song'

        // --- SONG MODE STATE ---
        let songStructure = [];
        let currentSongSectionIndex = 0;
        let currentSongSequencerId = '';
        let randomFillsEnabled = true;
        let isPlayingFill = false;
        let currentFillPattern = null;
        let fillStepCount = 0;
        let isCountInEnabled = false;
        
        // --- MIDI & EXAMPLE SONG DATA ---
        let midiAccess = null;
        let currentMidiInput = null;
        let currentMidiOutput = null;
        let exampleSongsData = {};
        
        // --- PATTERN DATA (LOADED FROM JSON) ---
        let RHYTHM_PATTERNS = {};

        // --- CONSTANTS ---
        const INSTRUMENTS = [
            'crash1', 'crash2', 'ride', 'china',
            'tom1', 'tom2', 'tom3', 'floor-tom',
            'hi-hat-open', 'hi-hat-closed', 'snare', 'kick'
        ];
        const FILL_INSTRUMENTS = ['snare', 'tom1', 'tom2', 'tom3', 'floor-tom'];

        async function initAudio() {
            if (audioContext) return;
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                await loadAllSamples();
            } catch (e) {
                alert('Web Audio API is not supported or could not be initialized.');
                console.error(e);
            }
        }
        async function loadSample(instrument) {
            try {
                const response = await fetch(`${instrument}.wav`);
                if (!response.ok) throw new Error(`Could not load ${instrument}.wav.`);
                const arrayBuffer = await response.arrayBuffer();
                audioBuffers[instrument] = await audioContext.decodeAudioData(arrayBuffer);
            } catch (error) {
                console.error(error);
                alert(`Failed to load sample: ${instrument}.wav. Ensure file exists.`);
            }
        }
        async function loadAllSamples() {
            await Promise.all(INSTRUMENTS.map(loadSample));
            console.log('All samples loaded.');
        }

                RHYTHM_PATTERNS = await response.json();

        function handleRemoveSequencer(e) {

        function updateSequencerGrid(sequencerId, numSteps) {

                header.querySelector('.time-signature-select').value = data.timeSignature;

                    header.querySelector('.tuplet-select').value = data.tuplet || 'none';

                if (!data.velocities[instrument]) data.velocities[instrument] = Array(64).fill(100);

                    stepsContainer.innerHTML += `

        function handleTimeSignatureChange(e) {
            const sequencerId = e.target.dataset.sequencerId;
            const newSignature = e.target.value;
            sequencersData[sequencerId].timeSignature = newSignature;
            updateBarHighlighting(sequencerId);

        function updateBarHighlighting(sequencerId) {
            const container = document.getElementById(`sequencer-${sequencerId}`);
            if (!container) return;

            container.querySelectorAll('.bar-start, .beat-marker').forEach(el => {
                el.classList.remove('bar-start', 'beat-marker');
            });
            
            const data = sequencersData[sequencerId];
            if (!data) return;

            const [beats, subdivision] = data.timeSignature.split('/').map(Number);
            
            // Accents align with either time signature subdivision or tuplet count
            let stepsPerBeat = subdivision === 8 ? 2 : 4;
            if (data.tuplet && data.tuplet !== 'none') {
                const [n, m] = data.tuplet.split(':').map(Number);
                if (n) {
                    stepsPerBeat = n;
                }
            }

            const stepsPerBar = beats * stepsPerBeat;

            if (stepsPerBar <= 0) return;

            for (let i = 0; i < data.steps; i++) {
                const stepCheckboxes = container.querySelectorAll(`.step-checkbox[data-step="${i}"]`);
                if (stepCheckboxes.length === 0) continue;

                if (i % stepsPerBar === 0) {
                    stepCheckboxes.forEach(cb => cb.classList.add('bar-start'));
                } 
                else if (i % stepsPerBeat === 0) {
                    stepCheckboxes.forEach(cb => cb.classList.add('beat-marker'));
                }
            }
        }
        
        function addGridEventListeners(sequencerId) {
            const container = document.getElementById(`sequencer-${sequencerId}`);
            container.querySelectorAll('.step-checkbox').forEach(cb => cb.onchange = handleStepChange);

            container.querySelectorAll('.clear-row-btn').forEach(btn => btn.onclick = handleClearRow);
        }

        function handleExportRhythm(e) {
            const sequencerId = e.target.dataset.sequencerId;
            const data = sequencersData[sequencerId];
            if (!data) {
                console.error("Sequencer data not found for ID:", sequencerId);
                return;
            }

            const patternObject = {};
            INSTRUMENTS.forEach(instrument => {
                const stepData = data.grid[instrument].slice(0, data.steps);
                if (stepData.some(isActive => isActive)) {
                    patternObject[instrument] = stepData.map(isActive => isActive ? 1 : 0);
                }
            });

            const exportData = {
                [data.name]: {
                    steps: data.steps,
                    timeSignature: data.timeSignature,
                    tuplet: data.tuplet || 'none',
                    pattern: patternObject
                }
            };
            
            const replacer = (key, value) => (Array.isArray(value) && INSTRUMENTS.includes(key)) ? `@@${JSON.stringify(value)}@@` : value;
            let jsonString = JSON.stringify(exportData, replacer, 2).replace(/"@@(.*?)@@"/g, '$1');

            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `rhythm-${data.name}.json`;
            document.body.appendChild(a);
            a.click();
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function handleImportRhythm(e) {
            const sequencerId = e.target.dataset.sequencerId;
            promptForFile(fileContent => {
                 try {
                    const importedData = JSON.parse(fileContent);
                    validateAndApplyRhythm(sequencerId, importedData);
                 } catch(error) {
                    alert(`Failed to import rhythm: ${error.message}`);
                    console.error("Import error:", error);
                 }
            });
        }
        
        function validateAndApplyRhythm(sequencerId, importedData) {
            const patternName = Object.keys(importedData)[0];
            if (!patternName) throw new Error("Invalid format: No top-level pattern name found.");

            const details = importedData[patternName];
            if (typeof details !== 'object' || details === null) throw new Error("Invalid format: Pattern data is missing.");
            
            const { steps, timeSignature, tuplet, pattern } = details;
            
            // Validation
            if (typeof steps !== 'number' || steps < 4 || steps > 64) throw new Error(`Invalid 'steps' value: Must be a number between 4 and 64.`);
            if (!VALID_TIME_SIGNATURES.includes(timeSignature)) throw new Error(`Invalid 'timeSignature' value: "${timeSignature}".`);
            if (typeof pattern !== 'object' || pattern === null) throw new Error("Invalid format: 'pattern' property is missing or not an object.");
            
            // Apply validated data
            const data = sequencersData[sequencerId];
            data.steps = steps;
            data.timeSignature = timeSignature;
            data.tuplet = tuplet || 'none';
            
            INSTRUMENTS.forEach(inst => data.grid[inst].fill(false));
            
            for (const instrument in pattern) {
                if (INSTRUMENTS.includes(instrument)) {
                    const stepArray = pattern[instrument];
                    if (Array.isArray(stepArray) && stepArray.every(s => s === 0 || s === 1)) {
                        for (let i = 0; i < data.steps && i < stepArray.length; i++) {
                            data.grid[instrument][i] = stepArray[i] === 1;
                        }
                    } else {
                        console.warn(`Ignoring invalid step data for instrument: ${instrument}`);
                    }
                }
            }

            updateSequencerGrid(sequencerId, data.steps);
            alert(`Rhythm '${patternName}' imported successfully into sequencer ${data.name}!`);
        }

        function handleInsertSequencers() {
            const amount = parseInt(sequencerAmountInput.value, 10);
            let nextCharIndex = 0;
            const existingNames = new Set(Object.values(sequencersData).map(s => s.name));
            
            for(let i = 0; i < amount; i++) {
                let newName;
                do {
                    newName = String.fromCharCode(65 + nextCharIndex++);
                } while(existingNames.has(newName) || nextCharIndex > 26);
                
                if (nextCharIndex <= 26) {
                    existingNames.add(newName);
                    createSequencer(newName, newName);
                } else {
                    alert("Maximum number of named sequencers (A-Z) reached.");
                    break;
                }
            }
        }
        function handleNameChange(e) {
            const newName = e.target.value.toUpperCase();
            const oldName = e.target.dataset.oldName;

            if (!/^[A-Z]$/.test(newName)) {
                alert(`Name must be a single letter (A-Z). Reverting.`);
                e.target.value = oldName;
                return;
            }

            const isTaken = Object.values(sequencersData).some(data => data.name === newName && data.name !== oldName);
            if (isTaken) {
                alert(`Name "${newName}" is already in use. Reverting.`);
                e.target.value = oldName;
                return;
            }
            sequencersData[e.target.dataset.sequencerId].name = newName;
            e.target.dataset.oldName = newName;
        }

        function handleRandomizeRow(e) {
            const { instrument, sequencerId } = e.target.dataset;
            const data = sequencersData[sequencerId];
            for (let i = 0; i < data.steps; i++) {
                data.grid[instrument][i] = Math.random() > 0.6;
